image:
  repository: docker-registry.wikimedia.org/wikimedia/mediawiki-services-change-propagation
  tag: 2025-07-28-033107-production
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 7200

kafka:
  dcName: mardi
  replicas: 3

mediawiki:
  host: http://wikibase

jobqueue:
  # Max concurrent job executions across ALL rules combined.
  # Must be set below pm.max_children of the jobrunner FPM pool.
  concurrency: 50

  # Seconds before a failed job is re-enqueued for retry.
  reenqueueDelay: 120

  # Milliseconds before retrying a failed job execution.
  retryDelay: 30000

  # Delay (seconds) after startup before consuming begins.
  # Gives Kafka consumers time to settle.
  startupDelay: 5

  numWorkers: 1
  workerHeapLimitMb: 256

  consumer:
    fetchWaitMaxMs: "100"
    fetchMinBytes: "1"

  producer:
    queueBufferingMaxMessages: "10"
    compressionCodec: snappy

  topicPattern: '/^mediawiki\.job\..*/'

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi