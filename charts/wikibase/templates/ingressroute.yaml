{{- if .Values.ingress.enabled }}
{{- $root := . }}
{{- $routeHosts := .Values.ingress.routeHosts | default (list .Values.global.baseDomain) }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: {{ include "wikibase.hostRule" $routeHosts | quote }}
      kind: Rule
      {{- if or .Values.blockHeaders.enabled .Values.fail2ban.enabled }}
      middlewares:
        {{- if .Values.fail2ban.enabled }}
        - name: {{ .Release.Name }}-fail2ban
          namespace: {{ .Release.Namespace }}
        {{- end }}
        {{- if .Values.blockHeaders.enabled }}
        - name: {{ .Release.Name }}-block-fake-agents
          namespace: {{ .Release.Namespace }}
        {{- end }}
      {{- end }}
      services:
        {{- if .Values.varnish.enabled }}
        - name: {{ .Values.varnish.fullnameOverride }}
          namespace: {{ .Release.Namespace }}
          port: 80
        {{- else }}
        - name: {{ .Release.Name }}
          namespace: {{ .Release.Namespace }}
          port: {{ .Values.apache.port }}
        {{- end }}
  tls:
    secretName: {{ .Release.Name }}-tls
{{- range $group := .Values.ingress.extraHostGroups }}
{{- $hosts := $group.hosts | default (list) }}
{{- if and (not $hosts) $group.domain $group.prefixes }}
{{- range $prefix := $group.prefixes }}
{{- $hosts = append $hosts (printf "%s.%s" $prefix $group.domain) }}
{{- end }}
{{- end }}
{{- if $hosts }}
{{- $nameContext := dict "releaseName" $root.Release.Name "groupName" $group.name }}
{{- $tlsNameContext := dict "releaseName" $root.Release.Name "groupName" $group.name "suffix" "tls" }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "wikibase.extraHostGroupName" $nameContext }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: {{ include "wikibase.hostRule" $hosts | quote }}
      kind: Rule
      {{- if or $root.Values.blockHeaders.enabled $root.Values.fail2ban.enabled }}
      middlewares:
        {{- if $root.Values.fail2ban.enabled }}
        - name: {{ $root.Release.Name }}-fail2ban
          namespace: {{ $root.Release.Namespace }}
        {{- end }}
        {{- if $root.Values.blockHeaders.enabled }}
        - name: {{ $root.Release.Name }}-block-fake-agents
          namespace: {{ $root.Release.Namespace }}
        {{- end }}
      {{- end }}
      services:
        {{- if $root.Values.varnish.enabled }}
        - name: {{ $root.Values.varnish.fullnameOverride }}
          namespace: {{ $root.Release.Namespace }}
          port: 80
        {{- else }}
        - name: {{ $root.Release.Name }}
          namespace: {{ $root.Release.Namespace }}
          port: {{ $root.Values.apache.port }}
        {{- end }}
  tls:
    secretName: {{ include "wikibase.extraHostGroupName" $tlsNameContext }}
{{- end }}
{{- end }}
{{- end }}
