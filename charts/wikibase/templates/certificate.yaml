{{- if .Values.ingress.enabled }}
{{- $root := . }}
{{- $routeHosts := .Values.ingress.routeHosts | default (list .Values.global.baseDomain) }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-tls
spec:
  secretName: {{ .Release.Name }}-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
{{- $routeHosts | toYaml | nindent 4 }}
  duration: 2160h # 90d
  renewBefore: 360h # 15d
{{- range $group := .Values.ingress.extraHostGroups }}
{{- $hosts := $group.hosts | default (list) }}
{{- if and (not $hosts) $group.domain $group.prefixes }}
{{- range $prefix := $group.prefixes }}
{{- $hosts = append $hosts (printf "%s.%s" $prefix $group.domain) }}
{{- end }}
{{- end }}
{{- if $hosts }}
{{- $tlsNameContext := dict "releaseName" $root.Release.Name "groupName" $group.name "suffix" "tls" }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "wikibase.extraHostGroupName" $tlsNameContext }}
spec:
  secretName: {{ include "wikibase.extraHostGroupName" $tlsNameContext }}
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
{{- $hosts | toYaml | nindent 4 }}
  duration: 2160h # 90d
  renewBefore: 360h # 15d
{{- end }}
{{- end }}
{{- end }}
