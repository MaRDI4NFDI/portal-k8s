apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-jobrunner
  labels:
    app: {{ .Release.Name }}-jobrunner
spec:
  replicas: {{ .Values.jobrunner.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-jobrunner
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-jobrunner
      annotations:
        kubectl.kubernetes.io/default-container: "mediawiki"
    spec:
      securityContext:
        fsGroup: 33 # www-data
      containers:
        - name: apache
          image: "{{ .Values.apache.image.repository }}:{{ .Values.apache.image.tag }}"
          imagePullPolicy: {{ .Values.apache.image.pullPolicy }}
          resources:
            requests:
              cpu: {{ .Values.jobrunner.apache.resources.requests.cpu }}
              memory: {{ .Values.jobrunner.apache.resources.requests.memory }}
            limits:
              cpu: {{ .Values.jobrunner.apache.resources.limits.cpu }}
              memory: {{ .Values.jobrunner.apache.resources.limits.memory }}
          ports:
            - containerPort: 80
          env:
            - name: WIKIBASE_HOST
              value: "127.0.0.1"
          startupProbe:
            httpGet:
              path: /w/api.php?action=query&meta=siteinfo&format=json
              port: 80
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            periodSeconds: 60
          readinessProbe:
            tcpSocket:
              port: 80
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
        - name: mediawiki
          image: "{{ .Values.mediawiki.image.repository }}:{{ .Values.mediawiki.image.tag }}"
          imagePullPolicy: {{ .Values.mediawiki.image.pullPolicy }}
          resources:
            requests:
              cpu: {{ .Values.jobrunner.mediawiki.resources.requests.cpu }}
              memory: {{ .Values.jobrunner.mediawiki.resources.requests.memory }}
            limits:
              cpu: {{ .Values.jobrunner.mediawiki.resources.limits.cpu }}
              memory: {{ .Values.jobrunner.mediawiki.resources.limits.memory }}
          ports:
            - containerPort: {{ .Values.mediawiki.port }}
          volumeMounts:
            {{- include "mediawiki.volumeMounts" . | nindent 12 }}
          env:
            {{- include "mediawiki.env" . | nindent 12 }}
            {{- include "mediawiki.phpfpmEnv" .Values.jobrunner.phpfpm | nindent 12 }}
          envFrom:
            {{- include "mediawiki.envFrom" . | nindent 12 }}
      volumes:
        {{- include "mediawiki.volumes" . | nindent 8 }}