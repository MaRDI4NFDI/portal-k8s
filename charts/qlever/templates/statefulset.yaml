apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}
spec:
  serviceName: {{ .Release.Name }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      initContainers:
        - name: fix-permissions
          image: "{{ .Values.qlever.image.repository }}:{{ .Values.qlever.image.tag }}"
          command: ["/bin/bash", "-c"]
          args: ["chown -R $(id -u qlever):$(id -g qlever) /data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: qlever-data
              mountPath: /data
      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.qlever.image.repository }}:{{ .Values.qlever.image.tag }}"
          workingDir: /data
          command: ["/bin/bash", "--login", "-c"]
          args:
            - {{ .Values.qlever.cmdString | quote }}
          volumeMounts:
            - name: qlever-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: qlever-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: "csi-rbd-sc"
        resources:
          requests:
            storage: {{ .Values.qlever.storage }}
