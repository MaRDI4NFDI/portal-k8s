{{- if .Values.ingress.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-readonly-proxy-config
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 1024; }
    http {
      # Re-resolve upstream DNS on each request
      resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;
      resolver_timeout 5s;

      client_max_body_size 50M;
      client_body_buffer_size 1M;
      large_client_header_buffers 8 64k;

      log_format sanitized '$remote_addr - $request_method $uri '
                           '$status $body_bytes_sent "$http_user_agent"';
      access_log /dev/stdout sanitized;
      error_log  /dev/stderr warn;

      # Strip access-token from the query string 
      map $args $clean_args {
        default                                    $args;
        "~*^(.*&)?access[-_]token=[^&]*(&.*)?$"    $1$2;
      }

      server {
        listen 8080;

        location = /healthz {
          return 200 "ok\n";
          access_log off;
        }

        location / {
          set $new_args $clean_args;
          # Hostname in a variable forces request-time DNS resolution.
          set $upstream "{{ .Release.Name }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.qlever.port }}";

          proxy_set_header Authorization "";
          proxy_pass http://$upstream$uri?$new_args;
          proxy_http_version 1.1;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          proxy_read_timeout  120s;
          proxy_send_timeout  120s;
          proxy_connect_timeout 10s;
        }
      }
    }
{{- end }}