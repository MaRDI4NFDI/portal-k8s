{{- if .Values.ingress.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-readonly-proxy-config
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 1024; }
    http {
      client_max_body_size 50M;
      client_body_buffer_size 1M;
      large_client_header_buffers 8 64k;

      log_format sanitized '$remote_addr - $request_method $uri '
                           '$status $body_bytes_sent "$http_user_agent"';
      access_log /dev/stdout sanitized;
      error_log  /dev/stderr warn;

      # Map any non-empty access-token parameter to empty, effectively
      # removing it. Works for GET and POST-with-query-string.
      map $args $clean_args {
        default                                    $args;
        "~*^(.*&)?access[-_]token=[^&]*(&.*)?$"    $1$2;
      }

      server {
        listen 8080;

        location = /healthz {
          return 200 "ok\n";
          access_log off;
        }

        location / {
          # Rewrite the query string to the token-stripped version.
          set $new_args $clean_args;

          # Also strip Authorization header
          proxy_set_header Authorization "";

          # Pass through to the internal QLever service.
          proxy_pass http://{{ .Release.Name }}:{{ .Values.qlever.port }}$uri?$new_args;
          proxy_http_version 1.1;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # QLever queries can be slow; generous timeouts.
          proxy_read_timeout  120s;
          proxy_send_timeout  120s;
          proxy_connect_timeout 10s;
        }
      }
    }
{{- end }}