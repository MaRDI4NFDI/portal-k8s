# Image
image:
  repository: apache/kafka
  tag: 3.9.0

# Cluster sizing
replicas: 3
replicationFactor: 3
minIsr: 2

# Resources per broker
storage: 20Gi
resources:
  requests:
    cpu: "250m"
    memory: "1Gi"
  limits:
    cpu: "1000m"
    memory: "1Gi"
heapOpts: "-Xmx512M -Xms512M"

secrets: "kafka-secrets"