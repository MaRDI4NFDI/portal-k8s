# Image
image:
  repository: apache/kafka
  tag: 3.9.0

# Cluster sizing
replicaCount: 3
replicationFactor: 3
minIsr: 2

# Resources per broker
storage: 20Gi
resources:
  requests:
    cpu: "250m"
    memory: "1Gi"
  limits:
    cpu: "1000m"
    memory: "1Gi"
heapOpts: "-Xmx512M -Xms512M"

secrets: "kafka-secrets"
 
# Topic settings
autoCreateTopics: true
numPartitions: 3
 
# Log retention
logRetentionHours: 4
logRetentionBytes: 1073741824   # 1Gi
logSegmentBytes: 134217728      # 128Mi
logRetentionCheckIntervalMs: 300000

antiAffinity: "hard"