apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: production
  labels:
    app: kafka-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
    spec:
      containers:
        - name: kafka-exporter
          image: danielqsj/kafka-exporter:latest
          args:
            - --kafka.server=kafka-0.kafka.production.svc.cluster.local:9092
            - --kafka.server=kafka-1.kafka.production.svc.cluster.local:9092
            - --kafka.server=kafka-2.kafka.production.svc.cluster.local:9092
            - --group.filter=cpjobqueue-job_execute
          ports:
            - name: metrics
              containerPort: 9308
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: production
  labels:
    app: kafka-exporter
spec:
  selector:
    app: kafka-exporter
  ports:
    - name: metrics
      port: 9308
      targetPort: metrics