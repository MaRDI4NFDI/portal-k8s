# PersistentVolumeClaim for the full-import Prefect workflow.
#
# This volume is mounted into every Prefect job pod via the deployment's
# job_variables.customizations .
#
# It stores:
#   - checkpoint.json  (tracks which steps have completed)
#   - any data the tasks want to share across runs
#
# All runs see the same volume, one after another (ReadWriteOnce is fine
# because concurrency is capped at 1 via the Prefect concurrency limit).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: importer-workflow-data
  labels:
    app: importer
    component: workflow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  # Must match your cluster's storage class (same as mariadb uses).
  storageClassName: csi-rbd-sc
