apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: change-propagation
  namespace: staging
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: staging-low
  chart:
    spec:
      version: "0.1.6"
  values:
    mediawiki:
      host: http://staging-wikibase-jobrunner
    kafka:
      replicas: 1
    joqueue:
      concurrency: 4


