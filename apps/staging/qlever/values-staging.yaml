apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: staging-qlever
  namespace: staging
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: staging-low
          - target:
              kind: StatefulSet
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: staging-low
  chart:
    spec:
      version: "0.1.21"
  values:
    qlever:
      data:
        name: mardi-staging
        description: MaRDI Knowledge Graph in Staging
    ingress:
      enabled: true
    updater:
      enabled: true