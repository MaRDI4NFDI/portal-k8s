apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kafka
  namespace: staging
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: StatefulSet
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: staging-low
  chart:
    spec:
      version: "0.1.9"
  values:
    replicaCount: 1
    replicationFactor: 1
    minIsr: 1
    numPartitions: 1
    antiAffinity: "soft"