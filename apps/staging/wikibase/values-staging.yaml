apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: staging-wikibase
spec:
  chart:
    spec:
      version: "0.1.94"
  values:
    mediawiki:
      image:
        repository: ghcr.io/mardi4nfdi/wikibase
        tag: sha-16767ac
      replicas: 1
      deployment_env: staging
      db_server: staging-mariadb-primary:3306
      db_primary: staging-mariadb-primary
      db_secondary: staging-mariadb-secondary
      elasticsearch_host: staging-opensearch
      redis_host: staging-redis-master
      memcached_host: staging-memcached
      formulasearch_host: staging-formulasearch
      latexml_host: staging-latexml
      importer_endpoint: staging-importer
      phpfpm:
        maxChildren: 15
        startServers: 2
        minSpareServers: 2
        maxSpareServers: 6
        maxRequests: 500
      opcache:
        memoryConsumption: 384
        maxAcceleratedFiles: 50000
        internedStringsBuffer: 16
        validateTimestamps: 1
        revalidateFreq: 60
        jitBufferSize: "64M"
      resources:
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          cpu: 1
          memory: 2Gi
    jobrunner:
      apache:
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      mediawiki:
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1
            memory: 1Gi
    varnish:
      enabled: true
      fullnameOverride: "staging-varnish"
    blockHeaders:
      enabled: false
    fail2ban:
      enabled: false
    secrets:
      mariadb: staging-mariadb-secrets
    ingress:
      enabled: true
