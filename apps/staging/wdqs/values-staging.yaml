apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: staging-wdqs
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: staging-low
          - target:
              kind: StatefulSet
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: staging-low
  chart:
    spec:
      version: "0.1.27"
  values:
    wdqs:
      host: staging-wdqs
      opts: "-Dorg.wikidata.query.rdf.tool.rdf.RdfRepository.timeout=3600 -Dcom.bigdata.rdf.sparql.ast.eval.AST2BOpUtility.timeout=60000"
    updater:
      wikibaseHost: "staging-wikibase"    
    prefix:
      scheme: http
    frontend:
      replicas: 1
