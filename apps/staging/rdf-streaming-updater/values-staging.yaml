apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rdf-streaming-updater
  namespace: staging
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: staging-low
  chart:
    spec:
      version: "0.1.22"
  values:
    config:
      wikiInternalUrl: "http://staging-wikibase"
    flink:
      logLevel: "DEBUG"