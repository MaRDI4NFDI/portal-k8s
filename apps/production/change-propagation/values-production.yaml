apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: change-propagation
spec:
  chart:
    spec:
      version: "0.1.6"
  values:
    mediawiki:
      host: http://wikibase-jobrunner
    jobqueue:
      concurrency: 18
      workerHeapLimitMb: 750
      topicPattern: '/^mediawiki\.job\.CreateProfilePages$/'
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 1Gi