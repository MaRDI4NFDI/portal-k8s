apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wikibase
spec:
  chart:
    spec:
      version: "0.1.75"
  values:
    mediawiki:
      image:
        repository: ghcr.io/mardi4nfdi/wikibase-production
        tag: 1.46.10
      replicas: 1
      db_server: mariadb-primary:3306
      db_primary: mariadb-primary
      db_secondary: mariadb-secondary
      elasticsearch_host: elasticsearch
      redis_host: redis-master
      formulasearch_host: formulasearch
      latexml_host: latexml
      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "6"
          memory: "10Gi"
    jobrunner:
      apache:
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      mediawiki:
        resources:
          requests:
            cpu: 4000m
            memory: 8Gi
          limits:
            cpu: 8000m
            memory: 16Gi
    varnish:
      enabled: true
    blockHeaders:
      enabled: true
    fail2ban:
      enabled: true
