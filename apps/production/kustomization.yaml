apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: production

resources:
  - namespace.yaml
  - mariadb
  - elasticsearch
  - opensearch
  - wikibase
  - ffmpeg
  - latexml
  - traefik
  - importer
  - quickstatements
  - s3-proxy
  - wdqs
  - mariadb-matomo
  - matomo
  - external-services
  # - maintenance
  - memcached
  - prefect-server
  - prefect-worker
  - deepchat
  - fdo
  - doip
  - qdrant
  - askmardi
  - kafka
  - schema-registry
  - eventgate
  - eventstreams
  - change-propagation
  - kafka-exporter

patches:
  - target:
      kind: HelmRelease
    patch: |-
      - op: add
        path: /spec/valuesFrom
        value:
          - kind: ConfigMap
            name: production-vars
            valuesKey: values.yaml